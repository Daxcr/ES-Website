<style>
    @keyframes FadeIn {
        0% {
            opacity: 0;
            transform: translateY(2vw);
            filter: blur(6px);
        }
        100% {
            opacity: 1;
            transform: translateY(0vw);
            filter: blur(0px);
        }
    }
    a {
        color: #676767;
        text-decoration: none;
        padding: 1.5vw;
    }
    a:hover {
        text-decoration: underline;
    }
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-size: 4vw;
        font-family: "Renogare";
        overflow-y: hidden;
    }
    @font-face {
        font-family: "Renogare";
        src: url("/Renogare-Regular.otf") format("opentype");
    }
    .url {
        --colour: #f34372;
        --bgcolour: #ff8070;
        --width: 0;
        color: var(--colour);
        font-size: 2vw;
        position: relative;
    }
    .url:hover {
        --width: 16vw !important;
    }
    .url::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%) translateY(-64.9%);
        width: var(--width);
        height: 300vh;
        background-color: var(--bgcolour);
        z-index: -1;
        opacity: 0.2;
        pointer-events: none;
        transition: width 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }
</style>
