<head>
    <title>Elemental Synergy</title>
    <link rel="icon" href="/icon.png" type="image/png">
    <link rel="preload" as="image" href="/icon.png">
    <link rel="preload" as="image" href="/icondark.png">
</head>
<style>
    :root {
        --docColour: #000000;
        --docBgColour: #ffffff;
    }
    @keyframes FadeIn {
        0% {
            opacity: 0;
            transform: translateY(2vw);
            filter: blur(6px);
        }
        100% {
            opacity: 1;
            transform: translateY(0vw);
            filter: blur(0px);
        }
    }
    a {
        color: #676767;
        text-decoration: none;
        padding: 1.5vw;
    }
    a:hover {
        text-decoration: underline;
    }
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-size: 4vw;
        font-family: "Lexend";
        overflow-y: hidden;
        background-color: var(--docBgColour);
        color: var(--docColour);
    }
    @font-face {
        font-family: "Renogare";
        src: url("/Resources/Renogare-Regular.otf") format("opentype");
    }
    @font-face {
        font-family: "Lexend";
        src: url("/Resources/Lexend-Regular.ttf") format("truetype");
    }
    .url {
        --colour: #f34372;
        --bgcolour: #ff8070;
        --width: 0;
        color: var(--colour);
        font-size: 2vw;
        position: relative;
    }
    .url:hover {
        --width: 16vw !important;
        filter: brightness(1.1);
    }
    .url::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%) translateY(-64.9%);
        width: var(--width);
        height: 300vh;
        background-color: var(--bgcolour);
        z-index: -1;
        opacity: 0.2;
        pointer-events: none;
        transition: width 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .url::after {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%) translateY(-64.9%);
        width: var(--width);
        height: 300vh;
        outline: var(--bgcolour) calc(var(--width) / 120) solid;
        z-index: -1;
        opacity: 0.5;
        pointer-events: none;
        transition: width 0.8s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .iconcontainer {
        transition: transform 0.3s ease;
        user-select: none;
        z-index: 999;
    }
    .iconcontainer:hover {
        transform: scale(1.1);
    }
    .iconcontainer:active {
        transform: scale(0.9);
    }
</style>
<span class="iconcontainer"><img src="/icon.png" id="icon" style="width: 15vw; animation: FadeIn 0.8s ease-out forwards; animation-delay: 0.6s; opacity: 0;"></span>
<span style="animation: FadeIn 0.8s ease-out forwards; animation-delay: 0.9s; opacity: 0; z-index: 999; font-family: Renogare;">Elemental Synergy</span><br>
<span style="animation: FadeIn 0.8s ease-out forwards; animation-delay: 1.2s; opacity: 0;">
    <a href="https://dax.cr" class="url" target="_blank">dax.cr</a>
    <a href="https://github.com/Daxcr/ES-Website" class="url" style="--colour: #f5ad21; --bgcolour: #e9db6b;" target="_blank">github.com</a>
    <a href="https://discord.gg/YqjXmkYRb8" class="url" style="--colour: #3e83f2; --bgcolour: #4ac1ff;" target="_blank">discord.gg</a>
    <a href="https://www.youtube.com/@ElementalSynergy" class="url" style="--colour: #00cb9b; --bgcolour: #63e8a9;" target="_blank">youtube.com</a>
</span>
<script>
    const root = document.documentElement;

    const icon = document.getElementById("icon");
    let darktheme = localStorage.getItem("theme") === "true";

    function ApplyTheme(){
        if (darktheme) {
            root.style.setProperty("--docColour", "#ffffff");
            root.style.setProperty("--docBgColour", "#000000");
            icon.src = "/icondark.png";
        } else {
            root.style.setProperty("--docColour", "#000000");
            root.style.setProperty("--docBgColour", "#ffffff");
            icon.src = "/icon.png";
        }
    }

    ApplyTheme();

    icon.addEventListener("click", function() {
        darktheme = !darktheme;
        localStorage.setItem("theme", darktheme);
        ApplyTheme();
    });
</script>
